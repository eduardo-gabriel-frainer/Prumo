<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/styleDarkMode.css">

    <title>Prumo</title>
</head>

<body>

    <div>
        <nav class="d-none d-sm-block">
            <div class="container-logo">
                <a id="a-logo" href="/inicio.html">
                    <img src="img/logoQuadrada.png">
                </a>
                <div>
                    <h3>Prumo</h3>
                    <p>Gestão de Obras</p>
                </div>
            </div>

            <hr>

            <div id="links">
                <a href="/obras.html">
                    <i data-lucide="house"></i>
                    Obras
                </a>

                <a href="/checklist.html">
                    <i data-lucide="check"></i>
                    Checklist
                </a>

                <a href="/horas.html" class="active">
                    <i data-lucide="clock"></i>
                    Horas
                </a>

                <a href="#">
                    <i data-lucide="settings"></i>
                    Configuração
                </a>
            </div>
        </nav>

        <div>
            <header>
                <div class="dark-mode-toggle text-secondary">
                    <i data-lucide="moon"></i>
                </div>

                <button class="btn btn-outline-dark d-sm-none" data-bs-toggle="offcanvas" data-bs-target="#menuMobile">
                    ☰
                </button>
            </header>
        </div>

        <main class="m-10">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2>Cadastro de Horas</h2>
                    <p class="text-muted">
                        Registre as horas trabalhadas pelos colaboradores.
                    </p>
                </div>

            </div>

            <div class="card shadow-sm">
                <div class="card-body">

                    <form id="formHoras">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">Funcionário</label>
                                <select class="form-select" id="funcionario">
                                    <option value="">Selecione um funcionario</option>
                                    <option>Ilizeu</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Obra</label>
                                <select class="form-select" id="obra">
                                    <option value="">Selecione uma obra</option>
                                    <option>Casa do Mazzi</option>
                                    <option>Mario Bernandes</option>
                                    <option>Marinho Buzzi</option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Data</label>
                                <input type="date" class="form-control" id="data">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Hora de Entrada</label>
                                <input type="time" class="form-control" id="entrada">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Hora de Saída</label>
                                <input type="time" class="form-control" id="saida">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Intervalo (min)</label>
                                <input type="number" class="form-control" id="intervalo" placeholder="60">
                            </div>
                            <div class="col-12 d-flex justify-content-end">
                                <button type="button" class="btn" id="btnSalvar">
                                    <i data-lucide="save"></i>
                                    Salvar Registro
                                </button>
                            </div>

                        </div>

                    </form>

                </div>
            </div>

            <div class="card shadow-sm mt-4">
                <div class="card-body">

                    <h5 class="mb-3">Últimos Registros</h5>

                    <div class="table-responsive">

                        <table id="tabelaHoras" class="table table-hover">

                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Funcionário</th>
                                    <th>Obra</th>
                                    <th>Entrada</th>
                                    <th>Saída</th>
                                    <th>Total</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>


                        </table>

                    </div>

                </div>
            </div>

        </main>

    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="menuMobile">

        <div class="offcanvas-header d-flex justify-content-between">
            <h5>Prumo</h5>
            <i data-lucide="circle-x" data-bs-dismiss="offcanvas"></i>
        </div>

        <div>

            <a href="/obras.html">
                <i data-lucide="house"></i>
                Obras
            </a>

            <a href="/checklist.html">
                <i data-lucide="check"></i>
                Checklist
            </a>

            <a href="/horas.html" class="active">
                <i data-lucide="clock"></i>
                Horas
            </a>

            <a href="/configuracao.html">
                <i data-lucide="settings"></i>
                Configuração
            </a>

        </div>

    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
        <div id="toastSucesso" class="toast align-items-center text-white border-0 shadow-lg" role="alert"
            aria-live="assertive" aria-atomic="true" style="background-color: #198754; border-radius: 12px;">
            <div class="d-flex align-items-center p-2">
                <div class="toast-body d-flex align-items-center gap-2" style="font-size: 0.95rem;">
                    <i data-lucide="circle-check"></i>
                    <span>Registro salvo com sucesso.</span>
                </div>
                <button type="button" class="btn-close btn-close-white m-auto me-2" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="JS/horas.js"></script>

    <script src="JS/darkMode.js"></script>

</body>

</html>
