<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

    <link rel="stylesheet" href="CSS/style.css">

    <title>Prumo</title>
</head>

<body>

    <div>
        <nav class="d-none d-sm-block">
            <div class="container-logo">
                <a id="a-logo" href="/index.html">
                    <img src="img/logoQuadrada.png">
                </a>
                <div>
                    <h3>Prumo</h3>
                    <p>Gestão de Obras</p>
                </div>
            </div>

            <hr>

            <div id="links">
                <a href="/obras.html">
                    <i data-lucide="house"></i>
                    Obras
                </a>

                <a href="/checklist.html">
                    <i data-lucide="check"></i>
                    Checklist
                </a>

                <a href="/horas.html" class="active">
                    <i data-lucide="clock"></i>
                    Horas
                </a>

                <a href="#">
                    <i data-lucide="settings"></i>
                    Configuração
                </a>
            </div>
        </nav>

        <div>
            <header>
                <div class="d-flex gap-2">
                    <i data-lucide="moon"></i>
                    <i data-lucide="bell"></i>
                </div>

                <button class="btn btn-outline-dark d-sm-none" data-bs-toggle="offcanvas" data-bs-target="#menuMobile">
                    ☰
                </button>
            </header>
        </div>

        <main class="m-10">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2>Cadastro de Horas</h2>
                    <p class="text-muted">
                        Registre as horas trabalhadas pelos colaboradores.
                    </p>
                </div>

            </div>

            <div class="card shadow-sm">
                <div class="card-body">

                    <form id="formHoras">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">Funcionário</label>
                                <select class="form-select" id="funcionario">
                                    <option value="">Selecione um funcionario</option>
                                     <option>Ilizeu</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Obra</label>
                                <select class="form-select" id="obra">
                                    <option value="">Selecione uma obra</option>
                                    <option>Casa do Mazzi</option>
                                    <option>Mario Bernandes</option>
                                    <option>Marinho Buzzi</option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Data</label>
                                <input type="date" class="form-control" id="data">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Hora de Entrada</label>
                                <input type="time" class="form-control" id="entrada">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Hora de Saída</label>
                                <input type="time" class="form-control" id="saida">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Intervalo (min)</label>
                                <input type="number" class="form-control" id="intervalo" placeholder="60">
                            </div>
                            <div class="col-12 d-flex justify-content-end">
                                <button type="button" class="btn" id="btnSalvar">
                                    <i data-lucide="save"></i>
                                    Salvar Registro
                                </button>
                            </div>

                        </div>

                    </form>

                </div>
            </div>

            <div class="card shadow-sm mt-4">
                <div class="card-body">

                    <h5 class="mb-3">Últimos Registros</h5>

                    <div class="table-responsive">

                        <table id="tabelaHoras" class="table table-hover">

                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Funcionário</th>
                                    <th>Obra</th>
                                    <th>Entrada</th>
                                    <th>Saída</th>
                                    <th>Total</th>
                                </tr>
                            </thead>


                        </table>

                    </div>

                </div>
            </div>

        </main>

    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="menuMobile">

        <div class="offcanvas-header d-flex justify-content-between">
            <h5>Prumo</h5>
            <i data-lucide="circle-x" data-bs-dismiss="offcanvas"></i>
        </div>

        <div>

            <a href="/obras.html">
                <i data-lucide="house"></i>
                Obras
            </a>

            <a href="/checklist.html">
                <i data-lucide="check"></i>
                Checklist
            </a>

            <a href="/horas.html" class="active">
                <i data-lucide="clock"></i>
                Horas
            </a>

            <a href="/configuracao.html">
                <i data-lucide="settings"></i>
                Configuração
            </a>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script>

        lucide.createIcons();

        const tabela = $("#tabelaHoras").DataTable({
            language: {
                url: "https://cdn.datatables.net/plug-ins/1.13.8/i18n/pt-BR.json"
            }
        });

        function calcularHoras(entrada, saida, intervalo) {

            const [hEntrada, mEntrada] = entrada.split(":").map(Number);
            const [hSaida, mSaida] = saida.split(":").map(Number);

            let minutosEntrada = hEntrada * 60 + mEntrada;
            let minutosSaida = hSaida * 60 + mSaida;

            let totalMinutos = minutosSaida - minutosEntrada - intervalo;

            let horas = Math.floor(totalMinutos / 60);
            let minutos = totalMinutos % 60;

            return `${horas}h ${minutos}min`;
        }

        document.getElementById("btnSalvar").addEventListener("click", function () {
            const funcionario = document.getElementById("funcionario").value;
            const obra = document.getElementById("obra").value;
            const data = document.getElementById("data").value;
            const entrada = document.getElementById("entrada").value;
            const saida = document.getElementById("saida").value;
            const intervalo = Number(document.getElementById("intervalo").value);

            if (!funcionario || !obra || !data || !entrada || !saida) {
                alert("Preencha todos os campos.");
                return;
            }

            const dataFormatada = new Date(data).toLocaleDateString("pt-BR");

            const total = calcularHoras(entrada, saida, intervalo || 0);

            tabela.row.add([dataFormatada, funcionario, obra, entrada, saida, total]).draw();

            document.getElementById("formHoras").reset();
        });

        async function buscarNomes() {
            try {
                const response = await fetch('https://api.api-ninjas.com/v1/babynames?gender=neutral', {
                    method: 'GET',
                    headers: {
                        'X-Api-Key': 'eaY2lynmyl4MrlhCNjI3ZYcekf7ghN9KeZUGSFAU'
                    }
                })

                const data = await response.json();

                console.log(data)

                const selectFuncionario = document.getElementById('funcionario')

                data.forEach(nome => {
                    const option = document.createElement('option');

                    option.value = nome;
                    option.textContent = nome;

                    selectFuncionario.appendChild(option);
                });

            } catch (error) {
                console.log('Não foi possivel buscar os nomes na API')
            }
        }

        buscarNomes()

    </script>

</body>

</html>
