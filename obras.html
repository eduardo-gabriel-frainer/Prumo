<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/styleDarkMode.css">

    <title>Prumo</title>
</head>

<body>

    <div>
        <nav class="d-none d-sm-block">
            <div class="container-logo">
                <a id="a-logo" href="/index.html">
                    <img src="img/logoQuadrada.png">
                </a>
                <div>
                    <h3>Prumo</h3>
                    <p>Gestão de Obras</p>
                </div>
            </div>

            <hr>

            <div id="links">
                <a href="/obras.html" class="active">
                    <i data-lucide="house"></i>
                    Obras
                </a>

                <a href="/checklist.html">
                    <i data-lucide="check"></i>
                    Checklist
                </a>

                <a href="/horas.html">
                    <i data-lucide="clock"></i>
                    Horas
                </a>

                <a href="#">
                    <i data-lucide="settings"></i>
                    Configuração
                </a>
            </div>
        </nav>

        <div>
            <header>
                <div class="dark-mode-toggle text-secondary">
                    <i data-lucide="moon"></i>
                </div>

                <button class="btn btn-outline-dark d-sm-none" data-bs-toggle="offcanvas" data-bs-target="#menuMobile">
                    ☰
                </button>
            </header>
        </div>

        <main class="m-10">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2>Cadastro de Obras</h2>
                    <p class="text-muted">
                        Registre as Obras que estão em andamento
                    </p>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">

                    <form id="formObras">

                        <div class="row g-3">
                            <h3>Informações básicas</h3>
                            <div class="col-md-12">
                                <label class="form-label">Nome da obra</label>
                                <input class="form-control" id="obra">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Cliente</label>
                                <input class="form-control" id="cliente">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Telefone</label>
                                <input type="tel" class="form-control" id="telefone" placeholder="(47) 99999-9999">
                            </div>

                            <hr class="mt-5 border-secondary">

                            <h3>Localização</h3>

                            <div class="col-md-6">
                                <label class="form-label">CEP</label>
                                <input class="form-control" id="cep">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Endereco</label>
                                <input class="form-control" id="endereco">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Cidade</label>
                                <input class="form-control" id="cidade">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Estado</label>
                                <input class="form-control" id="estado">
                            </div>
                            <div class="col-12 d-flex justify-content-end">
                                <button type="button" class="btn" id="btnSalvar">
                                    <i data-lucide="save"></i>
                                    Salvar Registro
                                </button>
                            </div>

                        </div>

                    </form>

                </div>
            </div>

            <div class="card shadow-sm mt-4">
                <div class="card-body">

                    <h5 class="mb-3">Últimos Registros</h5>

                    <div class="table-responsive">

                        <table id="tabelaObras" class="table table-hover">

                            <thead>
                                <tr>
                                    <th>Obra</th>
                                    <th>Cliente</th>
                                    <th>Telefone</th>
                                    <th>Endereço</th>
                                </tr>
                            </thead>

                        </table>

                    </div>

                </div>
            </div>

        </main>

    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="menuMobile">

        <div class="offcanvas-header d-flex justify-content-between">
            <h5>Prumo</h5>
            <i data-lucide="circle-x" data-bs-dismiss="offcanvas"></i>
        </div>

        <div>

            <a href="/obras.html" class="active">
                <i data-lucide="house"></i>
                Obras
            </a>

            <a href="/checklist.html">
                <i data-lucide="check"></i>
                Checklist
            </a>

            <a href="/horas.html">
                <i data-lucide="clock"></i>
                Horas
            </a>

            <a href="/configuracao.html">
                <i data-lucide="settings"></i>
                Configuração
            </a>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="JS/obras.js"></script>

    <script src="JS/darkMode.js"></script>

</body>

</html>
