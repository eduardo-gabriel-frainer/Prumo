<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

    <link rel="stylesheet" href="CSS/style.css">

    <title>Prumo</title>
</head>

<body>

    <div>
        <nav class="d-none d-sm-block">
            <div class="container-logo">
                <a id="a-logo" href="/index.html">
                    <img src="img/logoQuadrada.png">
                </a>
                <div>
                    <h3>Prumo</h3>
                    <p>Gestão de Obras</p>
                </div>
            </div>

            <hr>

            <div id="links">
                <a href="/obras.html">
                    <i data-lucide="house"></i>
                    Obras
                </a>

                <a href="/checklist.html" class="active">
                    <i data-lucide="check"></i>
                    Checklist
                </a>

                <a href="/horas.html">
                    <i data-lucide="clock"></i>
                    Horas
                </a>

                <a href="#">
                    <i data-lucide="settings"></i>
                    Configuração
                </a>
            </div>
        </nav>

        <div>
            <header>
                <div class="d-flex gap-2">
                    <i data-lucide="moon"></i>
                    <i data-lucide="bell"></i>
                </div>

                <button class="btn btn-outline-dark d-sm-none" data-bs-toggle="offcanvas" data-bs-target="#menuMobile">
                    ☰
                </button>
            </header>
        </div>

        <main class="m-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2>Checklist da Obra</h2>
                    <p class="text-muted">
                        Crie seções e itens para acompanhar o andamento da obra.
                    </p>
                </div>

                <button class="btn btn-warning" id="btnNovaSecao">
                    <i data-lucide="plus"></i>
                    Nova Seção
                </button>
            </div>

            <div id="containerSecoes"></div>
        </main>

    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="menuMobile">

        <div class="offcanvas-header d-flex justify-content-between">
            <h5>Prumo</h5>
            <i data-lucide="circle-x" data-bs-dismiss="offcanvas"></i>
        </div>

        <div>

            <a href="/obras.html">
                <i data-lucide="house"></i>
                Obras
            </a>

            <a href="/checklist.html" class="active">
                <i data-lucide="check"></i>
                Checklist
            </a>

            <a href="/horas.html">
                <i data-lucide="clock"></i>
                Horas
            </a>

            <a href="/configuracao.html">
                <i data-lucide="settings"></i>
                Configuração
            </a>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script>

        lucide.createIcons();

        let contadorSecoes = 0;

        document.getElementById("btnNovaSecao").addEventListener("click", criarSecao);

        function criarSecao() {

            contadorSecoes++;

            const secaoId = `secao-${contadorSecoes}`;

            const secao = document.createElement("div");

            secao.className = "card shadow-sm secao-card";

            secao.innerHTML = `
            <div class="card-body">

                <div class="secao-header mb-3">
                
                    <div id="nomeItem">
                        <input placeholder="Nome da Seção..."></input>
                    </div>

                    <button
                        class="btn btn-outline-warning btnAdicionarItem"
                        data-secao="${secaoId}">
                        <i data-lucide="plus"></i>
                        Novo Item
                    </button>
                </div>

                <div id="${secaoId}"></div>

            </div>
            `;

            document
                .getElementById("containerSecoes")
                .appendChild(secao);

            lucide.createIcons();

            secao
                .querySelector(".btnAdicionarItem")
                .addEventListener("click", function () {

                    adicionarItem(this.dataset.secao);

                });
        }

        function adicionarItem(secaoId) {

            const grupoRadio = `grupo-${Date.now()}`;

            const item = document.createElement("div");

            item.className = "item-checklist";

            item.innerHTML = `
            <div class="d-flex  justify-content-between align-items-center">

                <div id="nomeItem">
                    <input placeholder="Nome do item..."></input>
                </div>

                <div class="radio-group">

                    <div class="form-check">
                        <input
                            class="form-check-input"
                            type="radio"
                            name="${grupoRadio}"
                            value="Sim">

                        <label class="form-check-label">
                            Sim
                        </label>
                    </div>

                    <div class="form-check">
                        <input
                            class="form-check-input"
                            type="radio"
                            name="${grupoRadio}"
                            value="Não">

                        <label class="form-check-label">
                            Não
                        </label>
                    </div>

                    <div class="form-check">
                        <input
                            class="form-check-input"
                            type="radio"
                            name="${grupoRadio}"
                            value="N/A">

                        <label class="form-check-label">
                            N/A
                        </label>
                    </div>

                </div>
            </div>
             `;

            document
                .getElementById(secaoId)
                .appendChild(item);
        }

        window.onload = function () {
            criarSecao();

            adicionarItem("secao-1");
        }

    </script>

</body>

</html>
